<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mobi EA - Trading Robot Manager</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rubik+Glitch&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080808;
      color: #f0f0f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    .rubik-glitch { font-family: 'Rubik Glitch', cursive !important; }
    .font-orbitron { font-family: 'Orbitron', sans-serif !important; }

    /* Refined Animations */
    @keyframes scaleIn { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.04); opacity: 1; } }
    @keyframes dotPulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
    @keyframes splashFade { 0% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes splashLogoIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes splashTextIn { 0% { opacity: 0; transform: translateY(8px); letter-spacing: 10px; } 100% { opacity: 1; transform: translateY(0); letter-spacing: 8px; } }
    @keyframes splashBarFill { 0% { width: 0%; } 100% { width: 100%; } }
    @keyframes ringPulse { 0% { transform: scale(0.9); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0; } 100% { transform: scale(0.9); opacity: 0; } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 15px var(--glow-color, rgba(196,30,58,0.2)); } 50% { box-shadow: 0 0 25px var(--glow-color, rgba(196,30,58,0.35)); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.16,1,0.3,1); }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out both; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.16,1,0.3,1); }
    .animate-slide-in-up { animation: slideInUp 0.35s cubic-bezier(0.16,1,0.3,1); }

    /* Visual Effects */
    @keyframes rainFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity:1; } 100% { transform: translateY(110vh) rotate(360deg); opacity:0; } }
    @keyframes floatUp { 0% { transform: translateY(100vh) scale(0.5); opacity:1; } 100% { transform: translateY(-10vh) scale(1.2); opacity:0; } }
    @keyframes lightning { 0%,100% { opacity:0; } 10% { opacity:1; } 20% { opacity:0; } 30% { opacity:0.8; } 40% { opacity:0; } }
    .effect-overlay { position:fixed; inset:0; z-index:300; pointer-events:none; overflow:hidden; }
    .effect-particle { position:absolute; animation-fill-mode:forwards; }
    @keyframes scanLine { 0% { top: 0%; } 100% { top: 100%; } }
    @keyframes scanPulse { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
    @keyframes symbolFloat { 0% { transform: translateY(-30px) rotate(0deg) scale(1); opacity:0; } 10% { opacity:0.6; } 50% { opacity:0.4; } 90% { opacity:0.15; } 100% { transform: translateY(115vh) rotate(90deg) scale(0.8); opacity:0; } }
    .symbol-rain-particle { position:absolute; font-weight:700; animation: symbolFloat linear forwards; pointer-events:none; }
    @keyframes lightningBolt { 0% { opacity:0; } 5% { opacity:1; } 10% { opacity:0.2; } 15% { opacity:0.9; } 25% { opacity:0; } 100% { opacity:0; } }
    @keyframes candleFall { 0% { transform: translateY(-60px) rotate(0deg); opacity:1; } 100% { transform: translateY(115vh) rotate(45deg); opacity:0; } }

    /* Glass */
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); }
    .glass-strong { background: rgba(12,12,12,0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }

    /* Draggable Icon */
    .draggable-icon { position: fixed; z-index: 200; cursor: grab; touch-action: none; }
    .draggable-icon:active { cursor: grabbing; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,8,8,0.82);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(32px);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: center; align-items: center;
      padding: 4px 0 env(safe-area-inset-bottom, 10px); z-index: 50;
    }
    .nav-btn {
      flex: 1; max-width: 110px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 12px; background: transparent; border: none;
      color: rgba(255,255,255,0.28); font-family: 'Inter'; font-size: 9px; font-weight: 600;
      letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s ease;
    }
    .nav-btn.active { color: #fff; }
    .nav-btn svg { transition: all 0.3s ease; }
    .nav-fire-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; transition: all 0.3s ease;
    }
    .nav-fire-btn:active { transform: scale(0.94); }

    /* Splash Screen */
    .splash-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #080808;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      animation: splashFade 3.5s ease-in-out forwards;
    }
    .splash-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      animation: ringPulse 2.5s ease-out infinite;
    }
    .splash-logo { animation: splashLogoIn 1s cubic-bezier(0.16,1,0.3,1) 0.2s both; z-index: 2; }
    .splash-title { animation: splashTextIn 0.8s ease-out 0.5s both; z-index: 2; }
    .splash-subtitle { animation: fadeInUp 0.6s ease-out 0.9s both; z-index: 2; }
    .splash-bar-container {
      width: 160px; height: 2px; background: rgba(255,255,255,0.05);
      border-radius: 4px; overflow: hidden; margin-top: 40px;
      animation: fadeIn 0.5s ease-out 1.2s both; z-index: 2;
    }
    .splash-bar {
      height: 100%; border-radius: 4px;
      animation: splashBarFill 2s ease-in-out 1.2s both;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ====== SVG Icons (clean, consistent stroke width) ======
    const HomeIcon = () => (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>);
    const PlusIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>);
    const PlayIcon = ({size=20,color="#fff"}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><polygon points="6 3 20 12 6 21"/></svg>);
    const SquareIcon = ({size=20,color="white"}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>);
    const SparklesIcon = ({color="white"}) => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>);
    const TrashIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>);
    const XIcon = ({size=18}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>);
    const ArrowLeftIcon = () => (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
    const ArrowRightIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
    const SettingsIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>);
    const CheckIcon = ({size=20}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>);
    const CrownIcon = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2 4l3 12h14l3-12-5 4-5-4-5 4-5-4z"/><rect x="5" y="18" width="14" height="3" rx="1"/></svg>);
    const ClockIcon = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
    const CameraIcon = () => (<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>);
    const ChartIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>);
    const LockIcon = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>);
    const MicIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>);

    // ====== Toast System ======
    const ToastContext = React.createContext(null);
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = useState([]);
      const addToast = (t) => {
        const id = Date.now();
        setToasts(prev => [...prev, { ...t, id }]);
        setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 3000);
      };
      return (
        <ToastContext.Provider value={addToast}>
          {children}
          <div style={{ position:'fixed', top:16, left:'50%', transform:'translateX(-50%)', zIndex:999, display:'flex', flexDirection:'column', gap:8, width:'calc(100% - 32px)', maxWidth:380, pointerEvents:'none' }}>
            {toasts.map(t => (
              <div key={t.id} className="animate-slide-in-up" style={{
                background: t.variant === 'destructive' ? 'rgba(220,38,38,0.95)' : 'rgba(22,22,22,0.95)',
                backdropFilter:'blur(20px)',
                color:'white', padding:'14px 18px', borderRadius:14, maxWidth:'100%',
                boxShadow:'0 8px 40px rgba(0,0,0,0.4)',
                border: t.variant === 'destructive' ? '1px solid rgba(255,255,255,0.1)' : '1px solid rgba(255,255,255,0.08)',
                pointerEvents:'auto'
              }}>
                <div style={{fontWeight:600, fontSize:13, marginBottom:2}}>{t.title}</div>
                <div style={{opacity:0.7, fontSize:12, fontWeight:400}}>{t.description}</div>
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };
    const useToast = () => React.useContext(ToastContext);

    // ====== Draggable Bot Icon ======
    const DraggableBotIcon = ({ image, onClose, onClick, tc }) => {
      const posRef = useRef({ x: 20, y: window.innerHeight - 160 });
      const [pos, setPos] = useState(posRef.current);
      const draggingRef = useRef(false);
      const startRef = useRef({ x:0, y:0 });
      const offsetRef = useRef({ x:0, y:0 });
      const movedRef = useRef(false);
      const activeRef = useRef(false);
      const a = tc?.accent || '#C41E3A';

      const handleStart = (cx, cy) => { activeRef.current = true; draggingRef.current = true; movedRef.current = false; startRef.current = {x:cx,y:cy}; offsetRef.current = posRef.current; };
      const handleMove = (cx, cy) => { if (!draggingRef.current) return; const dx=cx-startRef.current.x; const dy=cy-startRef.current.y; if(Math.abs(dx)>5||Math.abs(dy)>5) movedRef.current=true; const np={x:Math.max(0,Math.min(window.innerWidth-70,offsetRef.current.x+dx)),y:Math.max(0,Math.min(window.innerHeight-70,offsetRef.current.y+dy))}; posRef.current=np; setPos(np); };
      const handleEnd = () => { draggingRef.current=false; activeRef.current=false; };

      useEffect(() => {
        const mm=e=>handleMove(e.clientX,e.clientY); const mu=()=>handleEnd();
        const tm=e=>{e.preventDefault();handleMove(e.touches[0].clientX,e.touches[0].clientY);}; const te=()=>handleEnd();
        window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
        window.addEventListener('touchmove',tm,{passive:false}); window.addEventListener('touchend',te);
        return()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);window.removeEventListener('touchmove',tm);window.removeEventListener('touchend',te);};
      }, []);

      return (
        <div className="draggable-icon animate-scale-in" style={{left:pos.x,top:pos.y}}
          onMouseDown={e=>handleStart(e.clientX,e.clientY)} onTouchStart={e=>handleStart(e.touches[0].clientX,e.touches[0].clientY)}>
          <div style={{width:60,height:60,overflow:'hidden',animation:'float 3s ease-in-out infinite',filter:`drop-shadow(0 0 12px ${tc?.glow||'rgba(196,30,58,0.4)'}) drop-shadow(0 0 24px ${a}88)`}}>
            <img src="/assets/sitelogo.png" alt="Bot" style={{width:'100%',height:'100%',objectFit:'contain',filter:'invert(1) brightness(2)'}}/>
          </div>
        </div>
      );
    };

    // ====== Bot Status Popup ======
    const BotStatusPopup = ({ botName, botImage, onClose, onRemove, onStop, onQuotes, tc }) => {
      const a = tc?.accent || '#C41E3A';
      const d = tc?.dark || '#8B0000';
      const g = tc?.glow || 'rgba(196,30,58,0.5)';
      const displayName = botName || 'NAVIGATOR SCALPER PRO';
      return (
        <div style={{position:'fixed',inset:0,zIndex:150,display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={onClose}>
          {botImage ? <img src={botImage} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}}/> : <div style={{position:'absolute',inset:0,background:`linear-gradient(160deg,${d},#080808)`}}/>}
          <div style={{position:'absolute',inset:0,background:`linear-gradient(180deg,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.3) 40%,${a}22 70%,${a}44 100%)`}}/>

          <div onClick={e=>e.stopPropagation()} style={{position:'relative',zIndex:10,width:'100%',maxWidth:420,margin:'0 auto',display:'flex',flexDirection:'column',alignItems:'center',flex:1,paddingTop:48,paddingBottom:24}} className="animate-fade-in">
            {/* Avatar */}
            <div style={{width:80,height:80,borderRadius:'50%',overflow:'hidden',border:`2px solid ${a}80`,boxShadow:`0 0 40px ${g}`,marginBottom:24}}>
              {botImage ? <img src={botImage} alt="Bot" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,background:`linear-gradient(135deg,${a},${d})`}}>🤖</div>}
            </div>

            {/* Glass card */}
            <div style={{width:'88%',borderRadius:24,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(32px)',WebkitBackdropFilter:'blur(32px)',border:`1px solid ${a}25`,boxShadow:`0 0 60px ${a}15`,padding:'28px 24px',display:'flex',flexDirection:'column',alignItems:'center',position:'relative',overflow:'hidden'}}>
              {botImage && <img src={botImage} alt="" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:0.08,filter:'blur(8px)'}}/>}
              <div style={{position:'relative',zIndex:2,width:'100%',display:'flex',flexDirection:'column',alignItems:'center'}}>
                {/* SERVER ONLINE */}
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:'#22c55e',boxShadow:'0 0 12px rgba(34,197,94,0.6)',animation:'breathe 2s ease-in-out infinite'}}/>
                  <span style={{fontFamily:'Orbitron',fontSize:10,color:'#22c55e',letterSpacing:4,fontWeight:700}}>SERVER ONLINE</span>
                </div>
                <h1 className="rubik-glitch" style={{color:'white',fontSize:22,letterSpacing:3,textTransform:'uppercase',textAlign:'center',lineHeight:1.3,marginBottom:24,textShadow:`0 0 40px ${g}`}}>{displayName}</h1>
                <div style={{display:'flex',gap:12,width:'100%'}}>
                  <button onClick={e=>{e.stopPropagation();onStop?.();onClose();}} style={{flex:1,padding:'14px 0',borderRadius:12,background:`linear-gradient(135deg,${a},${d})`,border:'none',color:'white',fontFamily:'Orbitron',fontSize:11,fontWeight:700,letterSpacing:2,cursor:'pointer',boxShadow:`0 4px 20px ${g}`}}>STOP EA</button>
                  <button onClick={e=>{e.stopPropagation();onQuotes?.();onClose();}} style={{flex:1,padding:'14px 0',borderRadius:12,background:'rgba(255,255,255,0.06)',border:`1px solid ${a}40`,color:'white',fontFamily:'Orbitron',fontSize:11,fontWeight:700,letterSpacing:2,cursor:'pointer'}}>SCRIPT</button>
                </div>
              </div>
            </div>

            {/* Status box */}
            <div style={{width:'88%',marginTop:14,borderRadius:16,background:`linear-gradient(135deg,${a}bb,${d}bb)`,backdropFilter:'blur(8px)',padding:'16px 20px',boxShadow:`0 8px 30px ${g}`}}>
              <p style={{color:'white',fontSize:10,lineHeight:2.2,fontFamily:'Orbitron',fontWeight:500,letterSpacing:0.5}}>
                {'>'} {displayName} connected and ready<br/>
                {'>'} Servers Online — EA Active<br/>
                {'>'} Analysing chart on Connected Account<br/>
                {'>'} Waiting for Trade Execution<span className="animate-pulse" style={{color:'white'}}>|</span>
              </p>
            </div>

            <div style={{marginTop:'auto',paddingTop:20}}>
              <p className="rubik-glitch" style={{color:'rgba(255,255,255,0.6)',fontSize:16,letterSpacing:4,textShadow:`0 0 20px ${g}`}}>{displayName}</p>
            </div>

          robotName: data.robotName,
          mentorName: data.mentorName,

    // ====== Floating Trade Panel (mock orders) ======

    // ====== Bot Settings Modal ======

    // ====== Execution Flow ======
    const setupLines = ["SETTING UP MT5...", "ACCEPTING DISCLAIMER...", "LINKING ACCOUNT...."];

    const TypewriterLine = ({ text, onComplete }) => {
      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
        if (displayed.length < text.length) {
          const timer = setTimeout(() => setDisplayed(text.slice(0, displayed.length + 1)), 50);
          return () => clearTimeout(timer);
        } else { onComplete?.(); }
      }, [displayed, text]);
      return (
        <div style={{lineHeight:1.2}}>
          <span className="rubik-glitch" style={{fontSize:'1.3rem',letterSpacing:'0.04em',color:'#141414'}}>
            {displayed}{displayed.length < text.length && <span className="animate-pulse">|</span>}
          </span>
        </div>
      );
    };

    const CircularCountdown = ({ onComplete, tradeData }) => {
      const TOTAL = 1200;
      const [seconds, setSeconds] = useState(TOTAL);
      useEffect(() => { if (seconds > 0) { const t = setTimeout(() => setSeconds(c => c - 1), 1000); return () => clearTimeout(t); } else { onComplete?.(); } }, [seconds]);
      const radius = 88, stroke = 3, circumference = 2 * Math.PI * radius;
      const progress = seconds / TOTAL, dashOffset = circumference * (1 - progress);
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      const angle = progress * 2 * Math.PI - Math.PI / 2;
      const dotX = 100 + radius * Math.cos(angle), dotY = 100 + radius * Math.sin(angle);
      const td = tradeData || {};
      const sym = td.symbol || 'XAUUSDm';
      const dir = td.direction || 'buy';
      const entry = td.entry || '5090.67';
      const lot = td.lotSize || '0.01';
      const orderNum = '#' + (309304330 + Math.floor(Math.random()*1000));
      const logLines = [`Setting Up Trade on MT5`, `>>"${orderNum} ${dir} ${lot} ${sym} at ${entry} successful"`, `>>"${orderNum} ${dir} ${lot} ${sym} at ${entry} successful"`];
      return (
        <div style={{position:'fixed',inset:0,zIndex:100,display:'flex',flexDirection:'column',background:'#C41E3A'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',paddingTop:40}}>

              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',transform:'rotate(-90deg)'}} viewBox="0 0 200 200">
                <circle cx="100" cy="100" r={radius} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={stroke}/>
                <circle cx="100" cy="100" r={radius} fill="none" stroke="white" strokeWidth={stroke} strokeDasharray={circumference} strokeDashoffset={dashOffset} strokeLinecap="round" style={{transition:'all 1s linear'}}/>
                <circle cx={dotX} cy={dotY} r="6" fill="#22c55e" style={{transition:'all 1s linear'}}/>
              </svg>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',zIndex:10}}>
                <span style={{color:'rgba(255,255,255,0.5)',fontSize:11,fontFamily:'Orbitron',letterSpacing:3,fontWeight:600}}>MINUTES</span>
                <span className="rubik-glitch" style={{color:'white',fontSize:44,lineHeight:1}}>{minutes}:{secs.toString().padStart(2,'0')}</span>
              </div>
            </div>
            <span className="rubik-glitch" style={{color:'rgba(0,0,0,0.5)',fontSize:22,letterSpacing:4,marginTop:20}}>EA TORRENT</span>
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'0 24px 32px'}}>
            <div style={{marginBottom:24,textAlign:'center',display:'flex',flexDirection:'column',gap:6}}>
              {logLines.map((line, i) => <p key={i} className="rubik-glitch" style={{color:'#facc15',fontSize:13,lineHeight:1.4}}>{line}</p>)}
            </div>
            <button onClick={onComplete} style={{width:'100%',padding:16,borderRadius:16,background:'white',color:'#C41E3A',border:'none',fontSize:14,fontWeight:700,letterSpacing:2,cursor:'pointer',fontFamily:'Orbitron'}}>COPY LOG</button>
          </div>
        </div>
      );
    };

    const CSSDotsPattern = () => {
      const dots = [];
      for (let r = 0; r < 10; r++) {
        for (let c = 0; c < 10; c++) {
          dots.push(React.createElement('div', { key: `${r}-${c}`, style: { width: 6, height: 6, borderRadius: '50%', background: '#C41E3A', opacity: 0.5, animation: `dotPulse 2.5s ease-in-out ${(r*10+c)*0.03}s infinite` } }));
        }
      }
      return React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(10, 1fr)', gap: 18, width: 280 } }, dots);
    };

    const ExecutionFlow = ({ onComplete, tradeData }) => {
      const [phase, setPhase] = useState("setup");
      const [currentLine, setCurrentLine] = useState(0);
      const td = tradeData || {};
      const dynamicTradeLines = ["ORDER PLACEMENT", "IN PROGRESS", "TRADE AUTOMATED", `>> ${td.symbol||'XAUUSD'}.M`, `${td.direction||'BUY'} TP:${td.tp||'5090.67'}`, `SL:${td.sl||'5042.6'} PLACED`, "ORDER PLACEMENT"];
      const lines = phase === "setup" ? setupLines : dynamicTradeLines;
      const handleLineComplete = () => {
        if (phase==="countdown") return;
        if (currentLine < lines.length-1) { setTimeout(()=>setCurrentLine(c=>c+1), 350); }
        else if (phase==="setup") { setTimeout(()=>{setPhase("trades");setCurrentLine(0);}, 500); }
        else if (phase==="trades") { setTimeout(()=>setPhase("countdown"), 500); }
      };

            </div>

          </div>

          <p style={{color:'rgba(255,255,255,0.3)',fontSize:11,letterSpacing:3,marginBottom:8,fontWeight:500,textTransform:'uppercase'}}>Your Trading With</p>
          <h1 className="rubik-glitch" style={{color:'white',fontSize:26,letterSpacing:3,textTransform:'uppercase',textAlign:'center',lineHeight:1.2,marginBottom:18,padding:'0 28px',textShadow:`0 0 40px ${g}, 0 0 80px ${a}50`}}>{displayName}</h1>

          <div style={{padding:'8px 24px',borderRadius:9999,border:`1px solid ${a}30`,background:`${a}08`,marginBottom:28}}>
            <span style={{color:'rgba(255,255,255,0.45)',fontSize:11,letterSpacing:2,fontWeight:500}}>Powered by <span style={{color:a,fontWeight:700}}>MOBI EA</span></span>

          {/* 3 Glass Square Action Buttons - distinct styles */}
          <div style={{display:'flex',alignItems:'stretch',justifyContent:'center',gap:14,marginBottom:28,width:'100%',padding:'0 24px'}}>
            {[
              { label:'Remove', icon:<TrashIcon/>, action:onRemove, variant:'ghost' },
              { label:isActive?'Stop':'Start', icon:isActive?<SquareIcon size={22}/>:<PlayIcon size={22}/>, action:onTrade, variant:'primary' },
              { label:'Quotes', icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>, action:onQuotes, variant:'outline' }
            ].map(btn=>{
              const isPrimary = btn.variant==='primary';

    // ====== MetaTrader View ======
    const MetaTraderView = ({ isVIP, themeColor }) => {
      const [activeTab, setActiveTab] = useState('mt5');
      const [showPw, setShowPw] = useState(false);
      const [loading, setLoading] = useState(false);
      const toast = useToast();
      const [form, setForm] = useState(()=>{try{const s=localStorage.getItem('mt_credentials_mt5');return s?JSON.parse(s):{login:'',password:'',server:''};}catch{return{login:'',password:'',server:''};}});
      const [connected, setConnected] = useState(()=>{try{return localStorage.getItem('mt_connected_mt5')==='true';}catch{return false;}});
      const [accountId, setAccountId] = useState(()=>{try{return localStorage.getItem('mt_accountId_mt5')||'';}catch{return '';}});
      const [accountInfo, setAccountInfo] = useState(null);
      const [loadingInfo, setLoadingInfo] = useState(false);

      const switchTab = (t) => { localStorage.setItem(`mt_credentials_${activeTab}`,JSON.stringify(form)); localStorage.setItem(`mt_connected_${activeTab}`,connected.toString()); localStorage.setItem(`mt_accountId_${activeTab}`,accountId); setActiveTab(t); try{const s=localStorage.getItem(`mt_credentials_${t}`);setForm(s?JSON.parse(s):{login:'',password:'',server:''});setConnected(localStorage.getItem(`mt_connected_${t}`)==='true');setAccountId(localStorage.getItem(`mt_accountId_${t}`)||'');setAccountInfo(null);}catch{setForm({login:'',password:'',server:''});setConnected(false);setAccountId('');setAccountInfo(null);} };

      const MTAPI_BASE = activeTab === 'mt4' ? 'https://mt4.mtapi.io' : 'https://mt5.mtapi.io';

      const mtapiConnect = async ({ login, password, server }) => {
        const url = `${MTAPI_BASE}/ConnectEx?user=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}&server=${encodeURIComponent(server)}`;
        const resp = await fetch(url);
        const text = await resp.text();
        let token = text.trim().replace(/^"|"$/g,'');
        if (!resp.ok || !token || token.toLowerCase().includes('error') || token.toLowerCase().includes('invalid')) {
          throw new Error(token || `HTTP ${resp.status}`);
        }
        return token;
      };

      const mtapiAccount = async (token) => {
        const resp = await fetch(`${MTAPI_BASE}/AccountSummary?id=${encodeURIComponent(token)}`);
        if (!resp.ok) {
          // Fallback to /Account if AccountSummary not available
          const r2 = await fetch(`${MTAPI_BASE}/Account?id=${encodeURIComponent(token)}`);
          if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
          return r2.json();
        }
        return resp.json();
      };

      const friendlyError = (msg) => {
        if (!msg) return 'Unknown error occurred.';
        const m = String(msg);
        if (/invalid|auth|password|login/i.test(m))
          return 'Invalid credentials. Check your login ID, password, server name, and selected platform (MT4/MT5).';
        if (/server|not found|unknown/i.test(m))
          return 'Server not found. Verify your broker server name matches exactly (case-sensitive).';
        if (/timeout|network|failed to fetch/i.test(m))
          return 'Network error reaching MTAPI. Try again in a moment.';
        return m;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.login || !form.password || !form.server) return;
        setLoading(true);
        try {
          toast({ title: 'Connecting…', description: `Linking ${activeTab.toUpperCase()} via MTAPI…` });
          const token = await mtapiConnect(form);

          setAccountId(token);
          setConnected(true);
          localStorage.setItem(`mt_credentials_${activeTab}`, JSON.stringify(form));
          localStorage.setItem(`mt_connected_${activeTab}`, 'true');
          localStorage.setItem(`mt_accountId_${activeTab}`, token);
          toast({ title: 'Account Linked!', description: `${activeTab.toUpperCase()} connected via MTAPI.` });

          try {
            const info = await mtapiAccount(token);
            setAccountInfo(info);
          } catch (e) { /* info fetch optional */ }
        } catch (err) {
          toast({ title: 'Connection Failed', description: friendlyError(err.message), variant: 'destructive' });
        }
        setLoading(false);
      };

      const fetchAccountInfo = async () => {
        if (!accountId) return;
        setLoadingInfo(true);
        try {
          const info = await mtapiAccount(accountId);

          symbol: String(order.symbol || order.Symbol || '').toUpperCase(),
          comment: String(order.comment || order.Comment || '').trim(),
          ticket: order.ticket ?? order.Ticket ?? order.order ?? order.Order ?? null,
          volume: Number(order.volume ?? order.Volume ?? order.lots ?? order.Lots ?? 0),
          raw: order,
        };
      };

      const mtapiOpenedOrders = async ({ base, token }) => {
        const resp = await fetch(`${base}/OpenedOrders?id=${encodeURIComponent(token)}`, { method: 'GET' });
        const text = await resp.text();
        let data; try { data = JSON.parse(text); } catch { data = text; }
        if (!resp.ok) throw new Error(typeof data === 'string' ? data : (data?.message || `HTTP ${resp.status}`));
        if (data && typeof data === 'object' && !Array.isArray(data) && data.message && data.code) {
          throw new Error(data.message || 'Could not verify open orders.');
        }
        return Array.isArray(data) ? data.map(normalizeMtapiOrder).filter(Boolean) : [];
      };

      const verifyMtapiOrder = async ({ base, token, symbol, comment, expectedVolume }) => {
        const targetSymbol = String(symbol || '').toUpperCase();
        const targetComment = String(comment || '').trim().toLowerCase();
        const targetVolume = Number(expectedVolume || 0);

        for (let i = 0; i < 6; i++) {
          const orders = await mtapiOpenedOrders({ base, token });
          const match = orders.find((order) => {
            const symbolMatch = order.symbol === targetSymbol;
            const commentMatch = !targetComment || String(order.comment || '').trim().toLowerCase() === targetComment;
            const volumeMatch = !targetVolume || Math.abs(Number(order.volume || 0) - targetVolume) < 0.000001;
            return symbolMatch && commentMatch && volumeMatch;
          });
          if (match) return match;
          await new Promise(resolve => setTimeout(resolve, 1200));
        }

        throw new Error('MTAPI did not show the trade in open orders after sending it.');
      };

      const handleExecutionComplete = async () => {
        setShowExecution(false); setShowDraggableIcon(true);
        const td = tradeData || {};
        const symbol = td.symbol || 'XAUUSD';
        const direction = td.direction || 'BUY';
        const tp = td.tp || 0;
        const sl = td.sl || 0;
        const lotSize = td.lotSize || 0.01;
        let symbolSettings = null;
        try {
          const configuredSymbols = JSON.parse(localStorage.getItem('mobi_ea_quote_symbols') || '[]');
          symbolSettings = Array.isArray(configuredSymbols)
            ? configuredSymbols.find((item) => String(item?.symbol || '').toUpperCase() === String(symbol).toUpperCase()) || null
            : null;
        } catch {}
        const preferredPlatform = String(td.platform || symbolSettings?.platform || '').toUpperCase();

        // Send real trade via MTAPI (mt5.mtapi.io / mt4.mtapi.io)
        const mt5Token = localStorage.getItem('mt_accountId_mt5') || '';
        const mt4Token = localStorage.getItem('mt_accountId_mt4') || '';
        const useMt4 = preferredPlatform === 'MT4';
        const useMt5 = preferredPlatform === 'MT5';
        const token = useMt4 ? mt4Token : useMt5 ? mt5Token : (mt5Token || mt4Token);
        const base = useMt4 ? 'https://mt4.mtapi.io' : useMt5 ? 'https://mt5.mtapi.io' : (mt5Token ? 'https://mt5.mtapi.io' : 'https://mt4.mtapi.io');

        if (token) {
          try {
            toast({ title: 'Mobi EA Executing...', description: `Sending ${direction} ${symbol} via MTAPI...` });
            const tradeResult = await mtapiOrderSend({
              base, token, symbol,
              operation: direction === 'BUY' ? 'Buy' : 'Sell',
              volume: lotSize, sl, tp, comment: 'Mobi EA',
            });

            const verifiedOrder = await verifyMtapiOrder({
              base,
              token,
              symbol,
              comment: 'Mobi EA',
              expectedVolume: lotSize,
            });

            toast({ title: 'Trade Placed by Mobi EA', description: `${direction} ${lotSize} ${symbol} opened successfully${verifiedOrder?.ticket ? ` — ticket ${verifiedOrder.ticket}` : ''}.` });
            console.log('MTAPI trade result:', tradeResult, 'Verified order:', verifiedOrder);
            setExecutionLogs(prev => [...prev, { id: Date.now(), time: new Date().toLocaleString(), pair: symbol, action: direction, tp: tp, sl: sl, lot: lotSize, order: verifiedOrder?.ticket ? '#' + verifiedOrder.ticket : '#' + (309304330 + prev.length), comment: 'Mobi EA' }]);
          } catch (err) {
            toast({ title: 'Trade Failed', description: err.message, variant: 'destructive' });
            console.error('MTAPI trade error:', err);
          }
        } else {
          toast({ title: 'No Account Linked', description: preferredPlatform ? `Link your ${preferredPlatform} account in MetaTrader tab to execute ${symbol}.` : 'Link an MT4/MT5 account in MetaTrader tab to execute real trades.', variant: 'destructive' });
        }


        setTradeData(null);
      };

      const handleSaveSettings = (name,image,video,iconImage) => {
        const s={...botSettings,name:botSettings.name,image,video,iconImage}; setBotSettings(s); localStorage.setItem('botSettings',JSON.stringify(s));
        toast({title:"Saved",description:"Settings updated."});
      };

      const renderContent = () => {
        switch(activeTab) {
          case 'home':
            return interfaceMode==='vip'
              ? <VIPHomeView eas={eas} selectedEA={selectedEA} setSelectedEA={setSelectedEA} onAddEA={handleAddEA} onRemoveEA={handleRemoveEA} onStartTrading={handleStartTrading} showDraggableIcon={showDraggableIcon} botSettings={botSettings} onOpenSettings={()=>setIsSettingsModalOpen(true)} executionLogs={executionLogs} onColorChange={handleColorChange} themeColor={themeColor} onNavigate={setActiveTab} onStopTrading={handleFullStop} onSwitchMode={m=>{setInterfaceMode(m);localStorage.setItem('interfaceMode',m);}} onEffect={setActiveEffect} onOpenChartAnalyzer={()=>setShowChartAnalyzer(true)}/>
              : <HomeView eas={eas} selectedEA={selectedEA} setSelectedEA={setSelectedEA} onAddEA={handleAddEA} onRemoveEA={handleRemoveEA} onStartTrading={handleStartTrading} showDraggableIcon={showDraggableIcon||!!tradeDelayTimer} botSettings={botSettings} onOpenSettings={()=>setIsSettingsModalOpen(true)} onColorChange={handleColorChange} themeColor={themeColor} onNavigate={setActiveTab} onStopTrading={handleFullStop} onSwitchMode={m=>{setInterfaceMode(m);localStorage.setItem('interfaceMode',m);}} onEffect={setActiveEffect} onChangePic={img=>{const s={...botSettings,image:img};setBotSettings(s);localStorage.setItem('botSettings',JSON.stringify(s));}} tradeDelaySeconds={tradeDelaySeconds} onOpenChartAnalyzer={()=>setShowChartAnalyzer(true)} isListening={isListening} voiceTranscript={voiceTranscript} onToggleVoice={toggleVoiceListening}/>
          case 'metatrader': return <MetaTraderView isVIP={interfaceMode==='vip'} themeColor={themeColor}/>;
          case 'settings': return <SettingsView themeColor={themeColor} onColorChange={handleColorChange} themeName={themeName} currentFont={appFont} onFontChange={handleFontChange} onEffect={setActiveEffect} onOpenSettings={()=>setIsSettingsModalOpen(true)} onOpenChartAnalyzer={()=>setShowChartAnalyzer(true)} botSettings={botSettings} interfaceMode={interfaceMode} onInterfaceModeChange={m=>{setInterfaceMode(m);localStorage.setItem('interfaceMode',m);}} isListening={isListening} voiceTranscript={voiceTranscript} onToggleVoice={toggleVoiceListening}/>;
          default: return null;
        }
      };

      if (!license) {
        return <SubscribeGate onActivated={handleActivated}/>;
      }

      return (
        <div style={{minHeight:'100vh',background:'#080808'}}>
          <BackgroundSymbolRain themeColor={themeColor}/>
          {showSplash && <SplashScreen onComplete={()=>setShowSplash(false)}/>}
          {showDraggableIcon && <DraggableBotIcon image={botSettings.iconImage||botSettings.image} onClose={handleFullStop} onClick={()=>setShowTradePanel(true)} tc={themeColor}/>}
          <FloatingTradePanel isOpen={showTradePanel} onClose={()=>setShowTradePanel(false)} tc={themeColor}/>
          {showExecution && <ExecutionFlow onComplete={handleExecutionComplete} tradeData={tradeData}/>}
          {showBotPopup && <BotStatusPopup botName={botSettings.name} botImage={botSettings.iconImage||botSettings.image} onClose={()=>setShowBotPopup(false)} onRemove={()=>{if(selectedEA)handleRemoveEA(selectedEA.id);}} onStop={handleFullStop} onQuotes={()=>setShowBotPopup(false)} tc={themeColor}/>}
          <VisualEffectsOverlay effect={activeEffect} onDone={()=>setActiveEffect(null)} themeColor={themeColor}/>
          <ChartAnalyzer isOpen={showChartAnalyzer} onClose={()=>setShowChartAnalyzer(false)} onExecute={(r,sym)=>{setTradeData({symbol:sym,direction:r.direction,entry:r.entry,tp:r.tp,sl:r.sl,lotSize:r.lotSize});setShowChartAnalyzer(false);setShowExecution(true);setShowDraggableIcon(true);}}/>
          <ColorPickerPanel isOpen={showColorPicker} onClose={()=>setShowColorPicker(false)} onColorChange={handleColorChange} currentColor={themeName} currentFont={appFont} onFontChange={handleFontChange} onEffect={setActiveEffect}/>
          <BotSettingsModal isOpen={isSettingsModalOpen} onClose={()=>setIsSettingsModalOpen(false)} currentName={botSettings.name} currentImage={botSettings.image} currentVideo={botSettings.video} currentIconImage={botSettings.iconImage} onSave={handleSaveSettings} interfaceMode={interfaceMode} onInterfaceModeChange={setInterfaceMode}/>
          <div style={{maxWidth:480,margin:'0 auto',paddingBottom:80}}>{renderContent()}</div>
          {!showSplash && <BottomNav activeTab={activeTab} onTabChange={setActiveTab} tc={themeColor}/>}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App/></ToastProvider>);
  </script>
</body>
</html>
